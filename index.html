<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAVIS INTEL — Global Risk Dashboard</title>
  <meta name="description" content="Real-time geopolitical news and risk analysis dashboard powered by The Guardian.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">J</div>
        <div>
          <div class="brand-name">JAVIS INTEL</div>
          <div class="brand-sub">Global Risk Dashboard</div>
        </div>
      </div>

      <div class="search-bar">
        <input
          id="search-input"
          type="search"
          placeholder="Search events, countries, topics…"
          autocomplete="off"
        >
        <button id="search-btn">Search</button>
      </div>

      <div class="header-status">
        <span class="live-dot">LIVE</span>
        <span id="last-update">—</span>
      </div>
    </div>
  </header>

  <!-- ── Category tabs ──────────────────────────────────────────────── -->
  <nav class="tabs" aria-label="News categories">
    <div class="tabs-inner">
      <button class="tab-btn active" data-section="all">All</button>
      <button class="tab-btn" data-section="world">World</button>
      <button class="tab-btn" data-section="politics">Politics</button>
      <button class="tab-btn" data-section="business">Business</button>
      <button class="tab-btn" data-section="environment">Environment</button>
      <button class="tab-btn" data-section="technology">Technology</button>
    </div>
  </nav>

  <!-- ── Main content ────────────────────────────────────────────────── -->
  <main class="main">
    <div class="feed-header">
      <h1>Intelligence Feed</h1>
      <span id="total-count"></span>
    </div>

    <p id="error-msg" hidden></p>

    <div id="loading">
      <div class="spinner"></div>
      <span>LOADING INTEL…</span>
    </div>

    <section id="feed" aria-label="News articles"></section>

    <div class="pagination">
      <button id="prev-page" disabled>← Prev</button>
      <span id="page-info">Page 1</span>
      <button id="next-page">Next →</button>
    </div>
  </main>

  <!-- ── Footer ──────────────────────────────────────────────────────── -->
  <footer class="footer">
    JAVIS INTEL · Powered by <a href="https://open-platform.theguardian.com/" target="_blank" rel="noopener" style="color:#3b82f6">The Guardian Open Platform</a>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
